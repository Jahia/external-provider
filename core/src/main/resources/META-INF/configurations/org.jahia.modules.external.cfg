# External Provider Identifier Cache Configuration
# This file configures the bidirectional identifier cache settings

# Maximum number of entries in the cache
# Default: 10000
cache.maxEntries = 10000

# Time-to-idle in minutes (entries not accessed within this time will be evicted)
# Set to 0 to disable idle-based eviction
# Default: 60 (1 hour)
cache.timeToIdleMinutes = 60

# Time-to-live in minutes (entries older than this will be evicted regardless of access)
# Set to 0 to disable TTL-based eviction
# Default: 120 (2 hours)
cache.timeToLiveMinutes = 120

# Note: If both timeToIdle and timeToLive are set, entries will be evicted when
# either condition is met (whichever comes first).
#
# Recommended settings:
# - For high-traffic systems: increase maxEntries, reduce timeToIdle
# - For low-traffic systems: reduce maxEntries, increase timeToIdle
# - For frequently changing data: reduce timeToLive
# - For stable data: increase timeToLive

