name: Nightly Test run (Jahia RL)

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'

jobs:
  integration-tests:
    name: Integration Tests (Jahia-RL)
    secrets: inherit
    uses: Jahia/jahia-modules-action/.github/workflows/reusable-integration-tests.yml@v2
    with:
      module_id: external-provider
      module_branch: ${{ github.ref }}
      jahia_image: jahia/jahia-ee:8
      provisioning_manifest: provisioning-manifest-snapshot.yml
      incident_service: external-provider-JahiaRL
      artifact_prefix: ep-rl
      testrail_project: External Provider
      timeout_job: 45
      timeout_step: 20
